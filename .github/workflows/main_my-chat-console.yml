name: Build and deploy to MonsterASP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Publish
        run: dotnet publish NotaionWebApp/Notaion/Notaion.csproj -c Release -o ./publish

      - name: Deploy via Web Deploy
        run: |
          msdeploy -verb:sync `
            -source:contentPath="${{ github.workspace }}\publish" `
            -dest:contentPath="${{ secrets.MSDEPLOY_SITE }}",`
              computerName="https://${{ secrets.MSDEPLOY_SERVER }}/msdeploy.axd",`
              userName="${{ secrets.MSDEPLOY_USERNAME }}",`
              password="${{ secrets.MSDEPLOY_PASSWORD }}",`
              authtype="Basic",`
              includeAcls="False" `
            -allowUntrusted `
            -enableRule:AppOffline
